<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-md-12">
        <div class="float-start">
          <h5>{{titulo}}</h5>
        </div>
        <div class="float-end" *ngIf="flagAction != 3">
          <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop"
            (click)="crear(modalEntidad)">Agregar</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="row mb-3">
      <div class="col-md-12">
        <!-- <h4>Acuerdos</h4> -->
        <table class="table">
          <thead>
            <tr>
              <th scope="col" style="width: 40%;">Acuerdo</th>
              <th scope="col" style="width: 30%;">Oficina responsable</th>
              <th scope="col" style="width: 15%;">Fecha limite </th>
              <th scope="col" style="width: 15%;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>acuerdo</td>
              <td>oficina</td>
              <td>fecha limite</td>
              <td>
                <div class="dropdown" dropdown placement="bottom-right">
                  <button class="btn btn-primary dropdown-toggle" data-toggle="dropdown" dropdownToggle
                    aria-expanded="false">
                    Acciones <i class="mdi mdi-chevron-down font-size-14"></i>
                  </button>
                  <ul class="dropdown-menu dropdown-menu-end" *dropdownMenu>
                    <li><a href="javascript: void(0);" class="dropdown-item" (click)="editar(equipoTrabajo)"><i
                          class="fas fa-pencil-alt text-success me-1"></i>Editar</a></li>
                    <li><a href="javascript: void(0);" class="dropdown-item"
                        (click)="eliminar(equipoTrabajo.ideEquipoTrabajo)"><i
                          class="fas fa-trash-alt text-danger me-1"></i>Eliminar</a></li>
                  </ul>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<ng-template #modalEntidad role="document" let-modal>
	<div class="modal-header">
        <h5 class="modal-title mt-0">{{tituloModal}}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="modalRef.hide()"></button>
	</div>
	<div class="modal-body">
		<!-- <app-integrantes-form-modal [modalRef]="modalRef" [integrante]="integrante" [flagAccion]="flagAccion" (onSave)="listar()"></app-integrantes-form-modal> -->
     <app-acuerdos-form-modal [modalRef]="modalRef" [flagAccion]="flagAccion"></app-acuerdos-form-modal>
	</div>
</ng-template>
